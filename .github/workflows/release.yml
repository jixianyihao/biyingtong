name: release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: '调试用：手动指定 tag 名（正常走 tag push）'
        required: true
        default: 'v5.0.0-dryrun'

jobs:
  build-desktop:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri -> target

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build Tauri bundle + create Release + upload assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: '必赢通 __VERSION__'
          releaseBody: |
            必赢通桌面版 Windows 安装器（NSIS）。**早期版本，LiveTrading 链路未接入。**

            下载 `.exe` 双击运行 → 安装向导 → 从开始菜单启动「必赢通」。

            首次启动 Windows SmartScreen 会警告"未知发布者"，点「更多信息 → 仍要运行」即可。未做代码签名的已知副作用。

            > 桌面壳只承载前端 UI。后端 Flask + TDX 服务需本地自行启动（`python app.py`），详见仓库 README。
          releaseDraft: false
          prerelease: false
